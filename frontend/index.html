<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>HS-NAS-R1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <div class="panels" id="panels">

    <!-- Panel 0 -->
    <section class="panel" data-panel="0">
      <div class="scroll">

        <div class="hd">
          <span class="hd-host" id="host">&#x1F4CA; 概况</span>
          <span class="hd-up" id="up">--</span>
        </div>

        <div class="duo">
          <div class="gauge">
            <svg viewBox="0 0 120 120" class="ring">
              <circle class="ring-bg" r="50" cx="60" cy="60"/>
              <circle class="ring-fill" id="cpu-ring" r="50" cx="60" cy="60"/>
              <text class="ring-pct" id="cpu-p" x="60" y="52">--</text>
              <text class="ring-lbl" x="60" y="78">CPU</text>
            </svg>
            <div class="gauge-sub" id="cpu-sub">--</div>
          </div>
          <div class="gauge">
            <svg viewBox="0 0 120 120" class="ring">
              <circle class="ring-bg" r="50" cx="60" cy="60"/>
              <circle class="ring-fill mem" id="mem-ring" r="50" cx="60" cy="60"/>
              <text class="ring-pct" id="mem-p" x="60" y="52">--</text>
              <text class="ring-lbl" x="60" y="78">内存</text>
            </svg>
            <div class="gauge-sub" id="mem-sub">-- / -- G</div>
          </div>
        </div>

        <div class="block">
          <div class="blk-h">&#x1F310; 网络 <span id="net-name"></span></div>
          <div class="net-bw">
            <div class="bw down"><span class="arr">&darr;</span><span id="rx">0</span></div>
            <div class="bw up"><span class="arr">&uarr;</span><span id="tx">0</span></div>
          </div>
          <div class="ipline"><b>IP</b><span id="ip4">--</span></div>
        </div>

        <div class="block">
          <div class="blk-h">&#x1F4BE; 存储</div>
          <div id="disks"></div>
        </div>

      </div>
    </section>

    <!-- Panel 1 -->
    <section class="panel" data-panel="1">
      <div class="scroll">

        <div class="hd">
          <span class="hd-host">&#x2699; 服务</span>
          <span class="hd-up" id="up2">--</span>
        </div>

        <div class="block">
          <div class="blk-h">&#x1F6E0; 核心服务</div>
          <div id="d-svc"></div>
        </div>

        <div class="block">
          <div class="blk-h">&#x1F433; Docker</div>
          <div id="d-docker"></div>
        </div>

        <div class="block">
          <div class="blk-h">&#x1F5A5; 虚拟机</div>
          <div id="d-vm"></div>
        </div>

        <div class="block">
          <div class="blk-h">&#x1F6AA; 界面</div>
          <button class="btn b-exit" id="b-exit">退出图形界面</button>
        </div>

        <div class="block dz">
          <div class="blk-h">&#x26A0; 电源操作</div>
          <button class="btn b-reboot" id="b-reboot">&#x1F504; 重启</button>
          <button class="btn b-shutdown" id="b-shutdown">&#x23FB; 关机</button>
        </div>

      </div>
    </section>

  </div>

  <div class="dots" id="dots"></div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <p id="modal-msg"></p>
      <div class="modal-btns">
        <button class="btn b-cancel" id="m-cancel">取消</button>
        <button class="btn b-danger" id="m-ok">确认</button>
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
