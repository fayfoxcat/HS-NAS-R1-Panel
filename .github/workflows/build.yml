name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o hs-nas-r1-panel .
          ls -lh hs-nas-r1-panel

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: hs-nas-r1-panel
          body: |
            HS-NAS-R1-Panel ${{ github.ref_name }}

            `curl -sSL https://raw.githubusercontent.com/fayfoxcat/HS-NAS-R1-Panel/master/install.sh | sudo bash`
